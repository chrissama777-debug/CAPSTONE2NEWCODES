<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DecisionPhone | Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script type="module" src="/js/main.js"></script>
</head>
<body data-page="login">
  <div data-app-nav></div>
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-5">
        <div class="auth-card p-4 p-md-5">
          <h1 class="section-title">Login</h1>
          <form data-login-form class="d-grid gap-3">
            <div><label class="form-label" for="loginEmail">Email</label><input id="loginEmail" class="form-control" type="email" name="email" required></div>
            <div><label class="form-label" for="loginPassword">Password</label><input id="loginPassword" class="form-control" type="password" name="password" required></div>
            <button class="btn btn-primary btn-lg">Login</button>
          </form>
          <div class="d-grid gap-2 mt-3">
            <button type="button" class="btn btn-outline-primary btn-lg" data-guest-view>Continue as Guest</button>
            <a class="btn btn-link" href="/register.html">Need an account? Register</a>
          </div>
        </div>
      </div>
    </div>
  </main>
  <div data-app-footer></div>
  <div data-toast-stack></div>
  <div data-loading-overlay></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
