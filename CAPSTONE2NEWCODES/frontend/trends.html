<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DecisionPhone | Trends</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module" src="/js/main.js"></script>
</head>
<body data-page="trends">
  <div data-app-nav></div>
  <main class="container py-4 py-lg-5">
    <div class="page-card p-3 p-lg-4 mb-4">
      <div class="row g-3 align-items-end">
        <div class="col-lg-5">
          <label class="form-label" for="trendSelect">Select a device</label>
          <select id="trendSelect" class="form-select" data-trend-device></select>
        </div>
        <div class="col-lg-7 text-lg-end">
          <div class="metric-badge mb-2">Market analytics</div>
          <div class="text-muted">Historical pricing plus a six-month forecast.</div>
        </div>
      </div>
    </div>
    <div class="page-card p-3 p-lg-4 mb-4">
      <h1 class="section-title">Trends & Analytics</h1>
      <div class="chart-shell position-relative" style="height: 360px;">
        <canvas id="trendChart"></canvas>
        <div data-trend-analysis class="trend-analysis"></div>
      </div>
    </div>
    <div class="row g-3 mb-4" data-trend-summary></div>
    <div class="page-card p-3 p-lg-4">
      <h2 class="h5 fw-bold">Insight Summary</h2>
      <p class="mb-0 text-muted" data-trend-insight>Select a device to view market insight.</p>
    </div>
  </main>
  <div data-app-footer></div>
  <div data-toast-stack></div>
  <div data-loading-overlay></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
