<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DecisionPhone | Compare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script type="module" src="/js/main.js"></script>
</head>
<body data-page="compare">
  <div data-app-nav></div>
  <main class="container py-4 py-lg-5">
    <div class="page-card p-3 mb-4">
      <h1 class="section-title">Comparison</h1>
      <p class="text-muted mb-0">Add phones from search or details pages, then compare up to four devices side by side.</p>
    </div>
    <div class="page-card p-3 mb-4">
      <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
        <h2 class="h5 fw-bold mb-0">Selected Phones</h2>
        <button class="btn btn-primary" data-save-comparison>Save Comparison</button>
      </div>
      <div class="table-responsive spec-table">
        <table class="table table-striped align-middle mb-0">
          <thead class="table-light"><tr><th>Phone</th><th>Action</th></tr></thead>
          <tbody data-compare-list></tbody>
        </table>
      </div>
    </div>
    <div class="page-card p-3 mb-4">
      <h2 class="h5 fw-bold mb-3">Side-by-Side Table</h2>
      <div class="table-responsive spec-table" data-compare-table-wrap></div>
    </div>
    <div class="page-card p-3">
      <h2 class="h5 fw-bold mb-3">Saved Comparisons</h2>
      <div data-saved-comparisons class="row g-3"></div>
    </div>
  </main>
  <div data-app-footer></div>
  <div data-toast-stack></div>
  <div data-loading-overlay></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/js/compare.js"></script>
</body>
</html>
