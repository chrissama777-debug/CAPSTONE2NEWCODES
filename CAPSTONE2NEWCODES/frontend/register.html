<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DecisionPhone | Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script type="module" src="/js/main.js"></script>
</head>
<body data-page="register">
  <div data-app-nav></div>
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="auth-card p-4 p-md-5">
          <h1 class="section-title">Create Account</h1>
          <form data-register-form class="d-grid gap-3">
            <div><label class="form-label" for="registerName">Name</label><input id="registerName" class="form-control" type="text" name="name" required></div>
            <div><label class="form-label" for="registerEmail">Email</label><input id="registerEmail" class="form-control" type="email" name="email" required></div>
            <div><label class="form-label" for="registerPassword">Password</label><input id="registerPassword" class="form-control" type="password" name="password" required></div>
            <div><label class="form-label" for="registerConfirm">Confirm Password</label><input id="registerConfirm" class="form-control" type="password" name="confirm_password" required></div>
            <button class="btn btn-primary btn-lg">Register</button>
          </form>
          <div class="d-grid gap-2 mt-3">
            <button type="button" class="btn btn-outline-primary btn-lg" data-guest-view>Continue as Guest</button>
            <a class="btn btn-link" href="/login.html">Already have an account? Login</a>
          </div>
        </div>
      </div>
    </div>
  </main>
  <div data-app-footer></div>
  <div data-toast-stack></div>
  <div data-loading-overlay></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
