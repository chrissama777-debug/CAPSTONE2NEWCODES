<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Price Graph | DecisionPhone</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module" src="/js/main.js"></script>
</head>
<body data-page="trend-graph">
  <div data-app-nav></div>
  <main class="container py-4">
    <div class="page-card p-3 mb-4">
      <div class="row g-3 align-items-end">
        <div class="col-md-6">
          <label class="form-label">Select a device</label>
          <select id="graphDevice" class="form-select"><option>Loading devices...</option></select>
          <div id="graphStatus" class="small text-muted mt-2">Initializing...</div>
        </div>
        <div class="col-md-6 text-md-end">
          <div class="metric-badge mb-2">Standalone Price Graph</div>
          <div class="text-muted">Full-width interactive price chart.</div>
        </div>
      </div>
    </div>

    <div class="page-card p-3 mb-4">
      <canvas id="priceGraph" style="width:100%; height:420px;"></canvas>
      <div id="graphDebug" class="p-3 small text-muted"></div>
    </div>
  </main>
  <div data-app-footer></div>
  <div data-toast-stack></div>
  <div data-loading-overlay></div>

  <script src="/js/trend-graph.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
