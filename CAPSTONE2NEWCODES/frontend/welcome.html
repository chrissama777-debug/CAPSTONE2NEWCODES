<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Welcome | DecisionPhone</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="welcome" style="background: linear-gradient(180deg,#f6f9f8, #eef2f1);">
  <div data-app-nav></div>
  <main class="container py-5">
    <div class="row justify-content-center align-items-center" style="min-height:60vh;">
      <div class="col-12 col-md-8 col-lg-6">
        <div class="card shadow-sm rounded-4 p-4 text-center">
          <h1 class="display-6 fw-bold">Welcome to DecisionPhone</h1>
          <p class="lead text-muted mb-4">Smart, data-driven help for picking the right phone. Explore reviews, comparisons, and market trends.</p>
          <div class="d-flex justify-content-center gap-3 mb-3 flex-wrap">
            <button id="primaryAction" type="button" class="btn btn-primary btn-lg" onclick="window.location.href='/login.html'">Login</button>
            <button id="secondaryAction" type="button" class="btn btn-outline-secondary btn-lg" onclick="window.location.href='/register.html'">Register</button>
            <button id="guestAction" type="button" class="btn btn-accent btn-lg" onclick="window.location.href='/index.html'">Continue as Guest</button>
          </div>
          <div class="small text-muted">You can always access the site at <a href="/index.html">Home</a>.</div>
        </div>
      </div>
    </div>
  </div>
</main>
  <div data-app-footer></div>
  <div data-toast-stack></div>
  <div data-loading-overlay></div>

  <script type="module" src="/js/main.js"></script>
  <script type="module">
    import { getUser } from '/js/main.js';

    window.addEventListener('DOMContentLoaded', () => {
      try {
        if (localStorage.getItem('dp_hide_welcome') === '1') {
          window.location.replace('/index.html');
          return;
        }
      } catch (error) {
        // Ignore storage failures and keep the welcome page usable.
      }

      const primary = document.getElementById('primaryAction');
      const secondary = document.getElementById('secondaryAction');
      const guest = document.getElementById('guestAction');
      if (!primary || !secondary || !guest) {
        return;
      }

      const user = getUser();
      if (user && user.role === 'admin') {
        primary.textContent = 'Open Admin Dashboard';
        primary.onclick = () => window.location.assign('/admin.html');
        secondary.textContent = 'Open Home';
        secondary.onclick = () => window.location.assign('/index.html');
        guest.textContent = 'Guest View';
        guest.onclick = () => window.location.assign('/index.html');
      } else if (user && user.role === 'user') {
        primary.textContent = 'Go to My Recommendations';
        primary.onclick = () => window.location.assign('/recommend.html');
        secondary.textContent = 'Open Home';
        secondary.onclick = () => window.location.assign('/index.html');
        guest.textContent = 'Guest View';
        guest.onclick = () => window.location.assign('/index.html');
      } else {
        primary.textContent = 'Login';
        primary.onclick = () => window.location.assign('/login.html');
        secondary.textContent = 'Register';
        secondary.onclick = () => window.location.assign('/register.html');
        guest.textContent = 'Continue as Guest';
        guest.onclick = () => {
          window.location.assign('/index.html');
        };
      }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
