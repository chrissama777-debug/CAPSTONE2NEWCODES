<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DecisionPhone | Search</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script type="module" src="/js/main.js"></script>
</head>
<body data-page="search">
  <div data-app-nav></div>
  <main class="container py-4 py-lg-5">
    <div class="row g-4">
      <aside class="col-lg-3">
        <div class="page-card p-3 sidebar">
          <h2 class="h5 fw-bold mb-3">Filters</h2>
          <div class="mb-3"><label class="form-label" for="queryFilter">Search</label><input id="queryFilter" class="form-control" type="text" placeholder="Brand, model, processor" data-filter-query></div>
          <div class="mb-3"><label class="form-label" for="brandFilter">Brand</label><select id="brandFilter" class="form-select" data-filter-brand><option value="">All brands</option><option>Samsung</option><option>Apple</option><option>Xiaomi</option><option>OnePlus</option><option>Realme</option><option>Oppo</option><option>Vivo</option><option>Google</option></select></div>
          <div class="mb-3"><label class="form-label" for="priceFilter">Max Price: <span class="fw-bold">$999</span></label><input id="priceFilter" class="form-range" type="range" min="100" max="1200" step="10" value="999" data-filter-price></div>
          <div class="mb-3"><label class="form-label" for="ramFilter">RAM</label><select id="ramFilter" class="form-select" data-filter-ram><option value="0">Any</option><option value="4">4 GB+</option><option value="6">6 GB+</option><option value="8">8 GB+</option><option value="12">12 GB+</option></select></div>
          <div class="mb-3"><label class="form-label" for="storageFilter">Storage</label><select id="storageFilter" class="form-select" data-filter-storage><option value="0">Any</option><option value="64">64 GB+</option><option value="128">128 GB+</option><option value="256">256 GB+</option><option value="512">512 GB+</option></select></div>
          <div class="mb-3"><label class="form-label" for="batteryFilter">Battery</label><select id="batteryFilter" class="form-select" data-filter-battery><option value="0">Any</option><option value="3000">3000 mAh+</option><option value="4000">4000 mAh+</option><option value="5000">5000 mAh+</option></select></div>
          <div class="mb-3"><label class="form-label" for="cameraFilter">Camera</label><select id="cameraFilter" class="form-select" data-filter-camera><option value="0">Any</option><option value="48">48 MP+</option><option value="50">50 MP+</option><option value="64">64 MP+</option><option value="108">108 MP+</option><option value="200">200 MP+</option></select></div>
        </div>
      </aside>
      <section class="col-lg-9">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
          <h1 class="section-title mb-0">Search & Filter</h1>
          <button class="btn btn-outline-primary d-none" data-load-more>Load More</button>
        </div>
        <div class="card-grid" data-search-results></div>
      </section>
    </div>
  </main>
  <div data-app-footer></div>
  <div data-toast-stack></div>
  <div data-loading-overlay></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
